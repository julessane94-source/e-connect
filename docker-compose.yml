version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agent_connect_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agent_connect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent_connect_network

networks:
  agent_connect_network:
    driver: bridge

volumes:
  postgres_data:
